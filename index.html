<!DOCTYPE html>
<html lang="es">

<head>

    <!-- ===================================================== -->
    <!-- CONFIGURACIÓN GENERAL -->
    <!-- ===================================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUTU</title>


    <!-- ===================================================== -->
    <!-- LIBRERÍAS EXTERNAS -->
    <!-- ===================================================== -->

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>

    <!-- Fuente Play -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>


    <!-- ===================================================== -->
    <!-- ESTILOS PERSONALIZADOS -->
    <!-- ===================================================== -->

    <style>

        /* Fuente principal */
        body{
            font-family:"Play", sans-serif;
            font-weight:400;
            background:#0a0a0f;
            color:#d1d1d1;
        }

        /* Fuente Regular */
        .play-regular{
            font-family:"Play", sans-serif;
            font-weight:400;
            font-style:normal;
        }

        /* Fuente Bold */
        .play-bold{
            font-family:"Play", sans-serif;
            font-weight:700;
            font-style:normal;
        }

        /* Título brillante */
        .glow{
            text-shadow:
                0 0 20px #00ffd5,
                0 0 60px #00ffd544;
        }

        /* Botones */
        .btn-cyber{
            border:1px solid #00ffd5;
            transition:.2s;
        }

        .btn-cyber:hover{
            background:#00ffd5;
            color:#0a0a0f;
        }

        /* Canvas Matrix */
        #matrix{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            z-index:-1;
            background:#000;
        }

        /* Todo el contenido sobre el fondo */
        main,
        #modal-backdrop,
        [id^="modal-"]{
            position:relative;
            z-index:1;
        }



        /* Pantalla inicial */
        #startScreen{
            background:rgba(0,0,0,.35);
            backdrop-filter:blur(1px);
            transition:opacity .7s ease, visibility .7s ease;
        }

        #startScreen.hidden-start{
            opacity:0;
            visibility:hidden;
            pointer-events:none;
        }

        .start-button{
            width:120px;
            height:120px;
            border-radius:999px;
            border:2px solid #00ffd5;
            background:rgba(0,0,0,.65);
            color:#00ffd5;
            font-size:52px;
            line-height:1;
            padding-left:8px;
            box-shadow:
                0 0 20px rgba(0,255,213,.45),
                inset 0 0 20px rgba(0,255,213,.12);
            transition:transform .2s ease, background .2s ease, color .2s ease;
        }

        .start-button:hover{
            transform:scale(1.08);
            background:#00ffd5;
            color:#0a0a0f;
        }

        /* La página principal parte oculta hasta presionar Play */
        #home{
            opacity:0;
            transform:translateY(20px);
            pointer-events:none;
            transition:opacity 1.1s ease, transform 1.1s ease;
        }

        body.started #home{
            opacity:1;
            transform:translateY(0);
            pointer-events:auto;
        }

        /* El controlador aparece después de iniciar */
        #musicButton{
            display:none;
        }

        body.started #musicButton{
            display:block;
        }

        /* Intensifica la cortina Matrix antes de mostrar el contenido */
        body.curtain #matrix{
            z-index:30;
        }

        body.started #matrix{
            z-index:-1;
        }


        /* Imagen weed volando en la parte superior */
        #weedFlying{
            position:fixed;
            top:34px;
            left:-140px;
            width:90px;
            z-index:4;
            pointer-events:none;
            opacity:0;
            animation:weedFly 10s linear infinite;
            filter:drop-shadow(0 0 12px rgba(0,255,213,.65));
        }

        /* Aparece cuando ya se presionó PLAY */
        body.started #weedFlying{
            opacity:1;
        }

        /* Movimiento horizontal + onda sinusoidal + giro */
        @keyframes weedFly{
            0%{
                transform:translateX(-140px) translateY(0) rotate(0deg);
            }
            12.5%{
                transform:translateX(12.5vw) translateY(-32px) rotate(45deg);
            }
            25%{
                transform:translateX(25vw) translateY(0) rotate(90deg);
            }
            37.5%{
                transform:translateX(37.5vw) translateY(32px) rotate(135deg);
            }
            50%{
                transform:translateX(50vw) translateY(0) rotate(180deg);
            }
            62.5%{
                transform:translateX(62.5vw) translateY(-32px) rotate(225deg);
            }
            75%{
                transform:translateX(75vw) translateY(0) rotate(270deg);
            }
            87.5%{
                transform:translateX(87.5vw) translateY(32px) rotate(315deg);
            }
            100%{
                transform:translateX(calc(100vw + 140px)) translateY(0) rotate(360deg);
            }
        }



        /* =====================================================
           REDISEÑO CYBERPUNK 2077 - VERDE + MORADO
        ===================================================== */

        :root{
            --cyber-green:#00ffd5;
            --matrix-green:#00ff41;
            --cyber-purple:#b026ff;
            --deep-purple:#26003f;
            --dark-panel:rgba(3,8,12,.78);
            --dark-panel-strong:rgba(4,6,10,.92);
        }

        *{
            box-sizing:border-box;
        }

        body{
            overflow-x:hidden;
            background:
                radial-gradient(circle at 20% 10%, rgba(176,38,255,.14), transparent 28%),
                radial-gradient(circle at 80% 90%, rgba(0,255,213,.12), transparent 30%),
                linear-gradient(135deg,#030509 0%,#080812 42%,#110018 100%);
        }

        /* Rejilla sutil estilo interfaz futurista */
        body::before{
            content:"";
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            background-image:
                linear-gradient(rgba(0,255,213,.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(176,38,255,.045) 1px, transparent 1px);
            background-size:42px 42px;
            mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), rgba(0,0,0,.2));
        }

        /* Líneas horizontales tipo pantalla CRT */
        body::after{
            content:"";
            position:fixed;
            inset:0;
            z-index:2;
            pointer-events:none;
            background:repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,.03) 0px,
                rgba(255,255,255,.03) 1px,
                transparent 1px,
                transparent 5px
            );
            mix-blend-mode:overlay;
            opacity:.35;
        }

        #matrix{
            filter:contrast(1.15) saturate(1.25);
        }

        .glow{
            text-shadow:
                0 0 8px var(--cyber-green),
                0 0 22px rgba(0,255,213,.7),
                2px 0 0 rgba(176,38,255,.75),
                -2px 0 0 rgba(0,255,65,.35);
        }

        /* Botones más cuadrados y tecnológicos */
        .btn-cyber{
            position:relative;
            border:1px solid var(--cyber-green) !important;
            border-radius:2px !important;
            background:
                linear-gradient(135deg, rgba(0,255,213,.11), rgba(176,38,255,.08)),
                rgba(0,0,0,.62);
            color:var(--cyber-green) !important;
            text-transform:uppercase;
            letter-spacing:.12em;
            box-shadow:
                0 0 0 1px rgba(176,38,255,.16),
                0 0 18px rgba(0,255,213,.22),
                inset 0 0 16px rgba(0,255,213,.08);
            clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
            overflow:hidden;
        }

        .btn-cyber::before{
            content:"";
            position:absolute;
            top:0;
            left:-100%;
            width:100%;
            height:100%;
            background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
            transition:left .35s ease;
        }

        .btn-cyber:hover::before{
            left:100%;
        }

        .btn-cyber:hover{
            background:linear-gradient(135deg, var(--cyber-green), rgba(176,38,255,.8));
            color:#05060a !important;
            transform:translateY(-2px);
            box-shadow:
                0 0 22px rgba(0,255,213,.65),
                0 0 28px rgba(176,38,255,.38);
        }

        /* Recuadro central más cuadrado, con esquinas recortadas */
        #home > div{
            position:relative;
            border-radius:2px !important;
            background:
                linear-gradient(135deg, rgba(0,255,213,.08), rgba(176,38,255,.07)),
                var(--dark-panel) !important;
            border:1px solid var(--cyber-green) !important;
            box-shadow:
                0 0 0 1px rgba(176,38,255,.45),
                0 0 30px rgba(0,255,213,.24),
                0 0 60px rgba(176,38,255,.13),
                inset 0 0 28px rgba(0,255,213,.07) !important;
            clip-path:polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
        }

        #home > div::before,
        #home > div::after{
            content:"";
            position:absolute;
            pointer-events:none;
        }

        #home > div::before{
            inset:12px;
            border-top:1px solid rgba(0,255,213,.35);
            border-bottom:1px solid rgba(176,38,255,.32);
        }

        #home > div::after{
            top:16px;
            right:18px;
            width:92px;
            height:10px;
            background:linear-gradient(90deg, var(--cyber-green) 0 42%, transparent 42% 52%, var(--cyber-purple) 52% 100%);
            box-shadow:0 0 12px rgba(0,255,213,.5);
        }

        #home h1{
            font-size:42px !important;
            letter-spacing:.32em;
            text-transform:uppercase;
            animation:titleGlitch 5s infinite steps(1,end);
        }

        #home p{
            color:#c7b7ff !important;
            text-shadow:0 0 10px rgba(176,38,255,.38);
        }

        @keyframes titleGlitch{
            0%, 92%, 100%{ transform:translate(0); }
            93%{ transform:translate(2px,-1px); }
            94%{ transform:translate(-2px,1px); }
            95%{ transform:translate(1px,0); }
        }

        /* Pantalla inicial más angular */
        #startScreen{
            background:
                radial-gradient(circle at center, rgba(0,255,213,.08), transparent 34%),
                rgba(0,0,0,.52) !important;
        }

        #startScreen .text-center{
            position:relative;
            padding:44px 56px;
            border:1px solid var(--cyber-green);
            border-radius:2px;
            background:rgba(0,0,0,.56);
            box-shadow:
                0 0 26px rgba(0,255,213,.22),
                0 0 42px rgba(176,38,255,.18),
                inset 0 0 24px rgba(176,38,255,.09);
            clip-path:polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
        }

        #startScreen .text-center::after{
            content:"SYSTEM READY // AUDIO ENABLED";
            position:absolute;
            left:18px;
            bottom:10px;
            font-size:10px;
            letter-spacing:.16em;
            color:rgba(176,38,255,.85);
        }

        .start-button{
            border-radius:2px !important;
            clip-path:polygon(14% 0, 100% 0, 100% 86%, 86% 100%, 0 100%, 0 14%);
            border:2px solid var(--cyber-green) !important;
            background:
                linear-gradient(135deg, rgba(0,255,213,.18), rgba(176,38,255,.13)),
                rgba(0,0,0,.75) !important;
            box-shadow:
                0 0 24px rgba(0,255,213,.5),
                0 0 38px rgba(176,38,255,.28),
                inset 0 0 20px rgba(0,255,213,.16) !important;
        }

        /* Controlador de música más cyberpunk */
        #musicButton{
            border-radius:2px !important;
            min-width:58px;
            height:42px;
            background:rgba(0,0,0,.78) !important;
            border-color:var(--cyber-purple) !important;
            color:var(--cyber-green) !important;
        }

        /* Modales y cartas con bordes cuadrados */
        [id^="modal-"] > div{
            border-radius:2px !important;
            border:1px solid var(--cyber-green) !important;
            background:
                linear-gradient(135deg, rgba(0,255,213,.07), rgba(176,38,255,.08)),
                var(--dark-panel-strong) !important;
            box-shadow:
                0 0 0 1px rgba(176,38,255,.42),
                0 0 34px rgba(0,255,213,.28),
                0 0 64px rgba(176,38,255,.16);
            clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
        }

        [id^="modal-"] > div > div:first-child{
            border-bottom:1px solid rgba(0,255,213,.42) !important;
            background:
                linear-gradient(90deg, rgba(0,255,213,.12), rgba(176,38,255,.12)),
                rgba(3,5,8,.96) !important;
        }

        [id^="modal-"] h2::before{
            content:"▌";
            color:var(--cyber-purple);
            margin-right:8px;
            text-shadow:0 0 10px var(--cyber-purple);
        }

        [id^="modal-"] .leading-relaxed{
            background:
                linear-gradient(180deg, rgba(0,255,213,.045), rgba(176,38,255,.045));
            border-left:2px solid rgba(0,255,213,.45);
            border-right:2px solid rgba(176,38,255,.35);
        }

        /* Forzar componentes más cuadrados aunque vengan con Tailwind */
        .rounded,
        .rounded-lg,
        button,
        a{
            border-radius:2px !important;
        }


        .hud-corner{
            position:fixed;
            width:120px;
            height:120px;
            z-index:3;
            pointer-events:none;
            opacity:.75;
        }

        .hud-top-left{
            top:18px;
            left:18px;
            border-top:2px solid var(--cyber-green);
            border-left:2px solid var(--cyber-purple);
            box-shadow:-6px -6px 18px rgba(176,38,255,.18);
        }

        .hud-bottom-right{
            right:18px;
            bottom:18px;
            border-right:2px solid var(--cyber-green);
            border-bottom:2px solid var(--cyber-purple);
            box-shadow:6px 6px 18px rgba(0,255,213,.18);
        }

        body:not(.started) .hud-corner{
            opacity:.25;
        }

        /* Detalle morado para la imagen voladora */
        #weedFlying{
            filter:
                drop-shadow(0 0 10px rgba(0,255,213,.75))
                drop-shadow(0 0 18px rgba(176,38,255,.45));
        }

    </style>

</head>

    <!-- ===================================================== -->
    <!-- JAVASCRIPT MODALES, MÚSICA Y EFECTO MATRIX -->
    <!-- ===================================================== -->

    <script>

        /* =====================================================
           MODALES DE CARTAS
        ===================================================== */

        function openModal(nombre){

            document
                .getElementById("modal-backdrop")
                .classList.remove("hidden");

            document
                .getElementById("modal-" + nombre)
                .classList.remove("hidden");

        }

        function closeModal(){

            document
                .getElementById("modal-backdrop")
                .classList.add("hidden");

            document
                .querySelectorAll('[id^="modal-"]')
                .forEach(modal=>{

                    if(modal.id!=="modal-backdrop"){
                        modal.classList.add("hidden");
                    }

                });

        }

        document.addEventListener("keydown",(e)=>{

            if(e.key==="Escape"){
                closeModal();
            }

        });



        /* =====================================================
           EFECTO MATRIX
        ===================================================== */

        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");

        const fontSize = 16;

        const caracteres =
            "アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        let columnas;
        let gotas;

        function resizeCanvas(){

            canvas.width = innerWidth;
            canvas.height = innerHeight;

            columnas = Math.floor(innerWidth / fontSize);
            gotas = Array(columnas).fill(1);

        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        function draw(){

            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";

            for(let i=0;i<gotas.length;i++){

                const letra =
                    caracteres[
                        Math.floor(Math.random()*caracteres.length)
                    ];

                ctx.fillText(
                    letra,
                    i*fontSize,
                    gotas[i]*fontSize
                );

                if(
                    gotas[i]*fontSize > canvas.height &&
                    Math.random()>0.975
                ){
                    gotas[i]=0;
                }

                gotas[i]++;

            }

        }

        setInterval(draw,35);



        /* =====================================================
           MÚSICA DE FONDO + PANTALLA PRESS START
        ===================================================== */

        const music = document.getElementById("bgMusic");
        const musicButton = document.getElementById("musicButton");
        const startButton = document.getElementById("startButton");
        const startScreen = document.getElementById("startScreen");
        const extraLink = document.getElementById("extraLink");

        music.volume = 0.5;

        function updateMusicButton(){
            musicButton.textContent = music.paused ? "▶" : "⏸";
        }

        startButton.addEventListener("click", async ()=>{

            document.body.classList.add("curtain");
            startScreen.classList.add("hidden-start");

            try{
                await music.play();
            }catch(error){
                console.log("El navegador bloqueó la reproducción de audio.");
            }

            updateMusicButton();

            setTimeout(()=>{
                document.body.classList.add("started");
                document.body.classList.remove("curtain");
            },1800);

        });

        musicButton.addEventListener("click",()=>{

            if(music.paused){
                music.play();
            }else{
                music.pause();
            }

            updateMusicButton();

        });

        extraLink.addEventListener("click",()=>{
            music.pause();
            updateMusicButton();
        });

        updateMusicButton();

    </script>

</body>
</html>
